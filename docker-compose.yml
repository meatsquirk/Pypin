# DCPP Multi-Implementation Test Environment
#
# This docker-compose setup creates a local DCPP network with:
# - 2 Python nodes (python-node-1, python-node-2)
# - 3 Rust nodes (rust-node-1, rust-node-2, rust-node-3)
# - Prometheus for metrics collection (optional)
# - Shared content volumes for testing replication
#
# Features enabled:
# - libp2p P2P networking with Kademlia DHT
# - BitTorrent data transfer (BEP 52)
# - Structured JSON logging
# - HTTP ingest API
# - Rate limiting and security hardening
# - Cross-implementation interoperability testing
#
# Usage:
#   docker-compose up -d                # Start all nodes
#   docker-compose up -d python-node-1  # Start specific node
#   docker-compose up -d rust-node-1    # Start Rust node
#   docker-compose logs -f              # View logs
#   docker-compose down                 # Stop all nodes
#
# Health checks:
#   curl http://localhost:8183/health   # Python node 1
#   curl http://localhost:8184/health   # Python node 2
#   curl http://localhost:8181/health   # Rust node 1
#   curl http://localhost:8182/health   # Rust node 2
#   curl http://localhost:8185/health   # Rust node 3

name: dcpp-python

networks:
  dcpp-network:
    name: dcpp-python-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/16  # Note: 172.30.x.x is used by dcpp-rust

volumes:
  # Shared content for testing replication
  content-source:
  # Per-node storage
  python-node-1-data:
  python-node-2-data:
  rust-node-1-data:
  rust-node-2-data:
  rust-node-3-data:

services:
  # ============================================
  # Python Nodes
  # ============================================

  python-node-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dcpp-python-py-1
    hostname: python-node-1
    networks:
      dcpp-network:
        ipv4_address: 172.31.2.1
    ports:
      - "5101:4001"   # libp2p / DCPP protocol
      - "8183:8080"   # HTTP API (health, status)
    volumes:
      - python-node-1-data:/data/dcpp
      - content-source:/content:ro
    environment:
      - PYTHONUNBUFFERED=1
      - DCPP_NODE_ID=python-node-1
      - DCPP_STUB_MODE=0
      - DCPP_GOSSIPSUB_MODE=network
      - DCPP_LIBP2P_NOISE_ONLY=1
      - DCPP_PROBE_INTERVAL_SECONDS=1
      - DCPP_ACCEPT_SKIPPED_MANIFESTS=1
      - DCPP_BOOTSTRAP_PEER_ID=${DCPP_BOOTSTRAP_PEER_ID:-}
    command: >
      --listen /ip4/0.0.0.0/tcp/4001
      --storage /data/dcpp
      --collection eth:0xBC4CA0EdBddf83641A86e72B10E2B8bB8e57060E
      --bootstrap ${DCPP_BOOTSTRAP_MULTIADDR:-/ip4/172.31.1.1/tcp/4001}
      --no-bootstrap-discovery
    depends_on:
      rust-node-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  python-node-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dcpp-python-py-2
    hostname: python-node-2
    networks:
      dcpp-network:
        ipv4_address: 172.31.2.2
    ports:
      - "5102:4001"   # libp2p / DCPP protocol
      - "8184:8080"   # HTTP API (health, status)
    volumes:
      - python-node-2-data:/data/dcpp
      - content-source:/content:ro
    environment:
      - PYTHONUNBUFFERED=1
      - DCPP_NODE_ID=python-node-2
      - DCPP_STUB_MODE=0
      - DCPP_GOSSIPSUB_MODE=network
      - DCPP_LIBP2P_NOISE_ONLY=1
      - DCPP_PROBE_INTERVAL_SECONDS=1
      - DCPP_ACCEPT_SKIPPED_MANIFESTS=1
      - DCPP_BOOTSTRAP_PEER_ID=${DCPP_BOOTSTRAP_PEER_ID:-}
    command: >
      --listen /ip4/0.0.0.0/tcp/4001
      --storage /data/dcpp
      --collection eth:0xb47e3cd837dDF8e4c57F05d70Ab865de6e193BBB
      --bootstrap ${DCPP_BOOTSTRAP_MULTIADDR:-/ip4/172.31.1.1/tcp/4001}
      --no-bootstrap-discovery
    depends_on:
      rust-node-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  # ============================================
  # Rust Nodes (from ../dcpp-rust)
  # ============================================

  rust-node-1:
    build:
      context: ../dcpp-rust
      dockerfile: Dockerfile.rust
      args:
        FEATURES: full
    container_name: dcpp-python-rust-1
    hostname: rust-node-1
    networks:
      dcpp-network:
        ipv4_address: 172.31.1.1
    ports:
      - "4101:4001"   # libp2p / DCPP protocol
      - "8181:8080"   # HTTP API (health, ingest)
      - "6981:6881"   # BitTorrent
    volumes:
      - rust-node-1-data:/data/dcpp
      - content-source:/content:ro
    environment:
      - RUST_LOG=${RUST_LOG:-info,dcpp=debug}
      - DCPP_NODE_ID=rust-node-1
      - DCPP_DHT_REANNOUNCE_INTERVAL=10
      - DCPP_ANNOUNCE_INTERVAL=30
      - DCPP_HEALTH_PROBE_INTERVAL=10
    command: >
      --transport libp2p
      --listen 0.0.0.0:4001
      --bt-port 6881
      --log-format pretty
      --ingest-api 0.0.0.0:8080
      --data-dir /data/dcpp
      --collection eth:0xBC4CA0EdBddf83641A86e72B10E2B8bB8e57060E
      --collection eth:0xb47e3cd837dDF8e4c57F05d70Ab865de6e193BBB
      --initial-content /content/eth:0xBC4CA0EdBddf83641A86e72B10E2B8bB8e57060E
      --no-bootstrap-discovery
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || nc -z localhost 4001"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  rust-node-2:
    build:
      context: ../dcpp-rust
      dockerfile: Dockerfile.rust
      args:
        FEATURES: full
    container_name: dcpp-python-rust-2
    hostname: rust-node-2
    networks:
      dcpp-network:
        ipv4_address: 172.31.1.2
    ports:
      - "4102:4001"   # libp2p / DCPP protocol
      - "8182:8080"   # HTTP API (health, ingest)
      - "6982:6881"   # BitTorrent
    volumes:
      - rust-node-2-data:/data/dcpp
      - content-source:/content:ro
    environment:
      - RUST_LOG=${RUST_LOG:-info,dcpp=debug}
      - DCPP_NODE_ID=rust-node-2
      - DCPP_DHT_REANNOUNCE_INTERVAL=10
      - DCPP_ANNOUNCE_INTERVAL=30
      - DCPP_HEALTH_PROBE_INTERVAL=10
    command: >
      --transport libp2p
      --listen 0.0.0.0:4001
      --bt-port 6881
      --log-format pretty
      --ingest-api 0.0.0.0:8080
      --data-dir /data/dcpp
      --collection eth:0xBC4CA0EdBddf83641A86e72B10E2B8bB8e57060E
      --bootstrap ${DCPP_BOOTSTRAP_MULTIADDR:-/ip4/172.31.1.1/tcp/4001}
      --no-bootstrap-discovery
    depends_on:
      rust-node-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || nc -z localhost 4001"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  rust-node-3:
    build:
      context: ../dcpp-rust
      dockerfile: Dockerfile.rust
      args:
        FEATURES: full
    container_name: dcpp-python-rust-3
    hostname: rust-node-3
    networks:
      dcpp-network:
        ipv4_address: 172.31.1.3
    ports:
      - "4103:4001"   # libp2p / DCPP protocol
      - "8185:8080"   # HTTP API (health, ingest)
      - "6983:6881"   # BitTorrent
    volumes:
      - rust-node-3-data:/data/dcpp
      - content-source:/content:ro
    environment:
      - RUST_LOG=${RUST_LOG:-info,dcpp=debug}
      - DCPP_NODE_ID=rust-node-3
      - DCPP_DHT_REANNOUNCE_INTERVAL=10
      - DCPP_ANNOUNCE_INTERVAL=30
      - DCPP_HEALTH_PROBE_INTERVAL=10
    command: >
      --transport libp2p
      --listen 0.0.0.0:4001
      --bt-port 6881
      --log-format pretty
      --ingest-api 0.0.0.0:8080
      --data-dir /data/dcpp
      --collection eth:0xb47e3cd837dDF8e4c57F05d70Ab865de6e193BBB
      --bootstrap ${DCPP_BOOTSTRAP_MULTIADDR:-/ip4/172.31.1.1/tcp/4001}
      --no-bootstrap-discovery
    depends_on:
      rust-node-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || nc -z localhost 4001"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  # ============================================
  # Monitoring (Optional - use 'monitoring' profile)
  # ============================================

  prometheus:
    image: prom/prometheus:latest
    container_name: dcpp-python-prometheus
    hostname: prometheus
    networks:
      dcpp-network:
        ipv4_address: 172.31.4.1
    ports:
      - "9091:9090"  # Note: 9090 may be used by dcpp-rust prometheus
    volumes:
      - ./scripts/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    depends_on:
      python-node-1:
        condition: service_healthy
    profiles:
      - monitoring
    restart: unless-stopped

  # ============================================
  # Content Seeder (Populates test content)
  # ============================================

  content-seeder:
    image: alpine:latest
    container_name: dcpp-python-content-seeder
    volumes:
      - content-source:/content
    command:
      - /bin/sh
      - -c
      - |
          set -e
          echo "Creating test content..."
          mkdir -p /content/eth:0xBC4CA0EdBddf83641A86e72B10E2B8bB8e57060E
          mkdir -p /content/eth:0xb47e3cd837dDF8e4c57F05d70Ab865de6e193BBB

          # Create sample NFT metadata files
          for i in 1 2 3 4 5; do
            echo "{\"name\":\"Test NFT $$i\",\"description\":\"Test content for DCPP\",\"image\":\"ipfs://QmTest$$i\"}" \
              > /content/eth:0xBC4CA0EdBddf83641A86e72B10E2B8bB8e57060E/token_$$i.json
          done

          for i in 1 2 3; do
            echo "{\"name\":\"Punk $$i\",\"attributes\":[{\"trait\":\"test\",\"value\":\"$$i\"}]}" \
              > /content/eth:0xb47e3cd837dDF8e4c57F05d70Ab865de6e193BBB/punk_$$i.json
          done

          echo "Test content created:"
          find /content -type f
          echo "Content seeder done."
